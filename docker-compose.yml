services:
  mongo:
    image: mongo:7
    container_name: tinyurl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tinyurl-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    env_file:
      - .env

  frontend:
    build:
      context: ./tinyurl-ui
      dockerfile: Dockerfile.frontend
    container_name: tinyurl-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:8000

volumes:
  mongo_data: